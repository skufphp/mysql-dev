services:
  # База данных MySQL
  mysql-dev:
    image: mysql:8.4
    container_name: mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
    networks:
      - mysql-dev-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # phpMyAdmin
  phpmyadmin-dev:
    image: phpmyadmin
    container_name: phpmyadmin-dev
    restart: unless-stopped
    environment:
      PMA_HOST: ${PMA_HOST}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    networks:
      - mysql-dev-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      mysql-dev:
        condition: service_healthy

volumes:
  mysql-data-dev:

networks:
  mysql-dev-network:
    driver: bridge